<!DOCTYPE html>
<html>
<head>
  <title>Something went wrong (Famble)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Fira+Sans:wght@200;500&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #E8AFAF;
      --bg-color: #fff;
      --text-color: #1f1f1f;
      --muted-text: rgba(0,0,0,0.55);
      --fs-title: 38px;
      --fs-text: 20px;
      --button-padding: 14px 26px;
    }


    body {
      min-height: 100vh;
      display: flex;
      font-family: "Fira Sans", sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .container {
      margin: auto;
      text-align: center;
      max-width: 520px;
      padding: 24px;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(232, 175, 175, 0.15);
      color: var(--primary-color);
      font-size: 28px;
    }

    h1 {
      font-size: var(--fs-title);
      font-weight: 500;
      color: var(--primary-color);
    }

    p {
      margin-top: 12px;
      font-size: var(--fs-text);
      color: var(--muted-text);
      line-height: 1.5;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.6;
    }

    .button {
      display: inline-block;
      margin-top: 24px;
      padding: var(--button-padding);
      border: 1px solid var(--primary-color);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: 0.15s ease;
    }

    .button:hover {
      background: var(--primary-color);
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- This file lives in public/500.html -->
  <div class="container">

    <div class="icon">
      <i class="fa-solid fa-screwdriver-wrench"></i>
    </div>

    <h1>Something went wrong</h1>
    <p>500 error</p>

    <div class="hint">
      Your meals, chores, and plans are safe.<br>
      Something just went wrong on our side.
    </div>

    <a class="button" href="/">
      Back to home
    </a>

  </div>

</body>
</html>
